version: 2

models:
  - name: fct_daily_events
    description: "Daily event fact table aggregated by date, event name, device type, and country. Useful for trend analysis and operational reporting."
    columns:
      - name: event_date
        description: "Calendar date of the events included in the aggregate."
        tests:
          - not_null

      - name: event_name
        description: "Normalized event name used for the aggregation."
        tests:
          - not_null

      - name: device_type
        description: "Normalized device category used in the aggregation."

      - name: country
        description: "Normalized country used in the aggregation."

      - name: total_events
        description: "Number of events in the group."
        tests:
          - not_null

      - name: unique_users
        description: "Count of distinct users who generated events in the group."
        tests:
          - not_null

      - name: unique_sessions
        description: "Count of distinct sessions represented in the group."
        tests:
          - not_null

  - name: fct_daily_active_users
    description: "Daily KPI table containing the number of active users per date."
    columns:
      - name: event_date
        description: "Calendar date for the activity measurement."
        tests:
          - not_null
          - unique

      - name: daily_active_users
        description: "Count of distinct users who generated at least one event on the given date."
        tests:
          - not_null

  - name: dim_users
    description: "User-level mart summarizing lifecycle activity from the event stream."
    columns:
      - name: user_id
        description: "Unique user identifier."
        tests:
          - not_null
          - unique

      - name: first_seen_at
        description: "Timestamp of the earliest event recorded for the user."
        tests:
          - not_null

      - name: last_seen_at
        description: "Timestamp of the latest event recorded for the user."
        tests:
          - not_null

      - name: lifetime_event_count
        description: "Total number of events generated by the user across the full available history."
        tests:
          - not_null

      - name: lifetime_session_count
        description: "Total number of distinct sessions associated with the user."
        tests:
          - not_null
