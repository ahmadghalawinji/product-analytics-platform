version: 2

sources:
  - name: raw_data
    description: "Raw event data ingested into Redshift from the product analytics source system."
    database: dev
    schema: raw_data
    tables:
      - name: events
        description: "Source event table at event grain, where each row represents a single product event generated by a user."
        columns:
          - name: event_id
            description: "Unique identifier for each event emitted by the application."
          - name: user_id
            description: "Identifier of the user who triggered the event."
          - name: event_name
            description: "Name of the tracked event before dbt standardization."
          - name: event_timestamp
            description: "Timestamp when the event occurred in the source system."
          - name: session_id
            description: "Identifier used to group related user events into a session."
          - name: device_type
            description: "Device category captured by the tracking system, such as mobile or desktop."
          - name: country
            description: "Country associated with the event."
          - name: metadata
            description: "Semi-structured event payload stored as a Redshift SUPER column."
